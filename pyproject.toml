[project]
name = "shopping-ai-env"
version = "0.1.0"
description = "AI-powered shopping environment for OpenEnv evaluation"
authors = [{ name = "Jaanvi Kapoor" }]

dependencies = [
  "fastapi",
  "uvicorn",
  "openai",
  "openenv-core[core]>=0.2.2",
]
requires-python = ">=3.10"

[project.scripts]
server = "server.app:main"

[build-system]
requires = ["setuptools"]
build-backend = "setuptools.build_meta"
